<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-init.js"></script>
    <script src="auth.js"></script>
    <script src="script.js" defer></script>
    <title>Account Page</title>
</head>
<body class="account-page">
    <header>
        <a href="index.html">
            <img class="header-logo" src="assets/GKL Labs.png" alt="GKL Labs">
        </a>
        <div class="header-right">
            <div class="menu-btn" onclick="openOverlay()">
                <img src="assets/Menu Icon.png" alt="Menu" />
            </div>
        </div>
    </header>
    <div class="pagebg">
        <img class="pagebg-logo" src="assets/MAIN GKL LOGO.png" alt="" />
        <div class="pagebg-content">
            <h1 class="aptitle">Account Settings</h1>
            <div class="apsecs">
                <div class="apsecs-buttons">
                    <img src="assets/acc info.png" alt="Button 1" onclick="openProfileOverlay()" />
                    <img src="assets/change pass.png" alt="Button 2" onclick="openPasschangeOverlay()" />
                    <img src="assets/purchase history.png" alt="Button 3" onclick="openPurchasehistoryOverlay()" />
                </div>
            </div>
        </div>
    </div>
    <div class="pagebgend"></div>

    <div class="profile-overlay" id="profileOverlay">
        <div class="profile-close-row">
            <img src="assets/close.png" alt="Close" onclick="closeProfileOverlay()" />
        </div>
        <div class="profile-overlay-content">
            <div class="profile-info-box">
                <img src="assets/profic.png" alt="Profile" class="profile-pic" />
                <span class="profile-name">First Name</span>
            </div>
            <div class="current-username-box">
                <span class="current-username-label">Current Username</span>
                <hr class="username-divider" />
                <span class="current-username-value">username</span>
            </div>
            <a href="#" class="change-username-btn" onclick="openUsernameChangeOverlay(); return false;">Change Username</a>
            <p class="username-warning">Attention: username is used to log into your account</p>
            <p class="account-created">Account created: <span id="accountCreatedDate"></span></p>
        </div>
    </div>

    <div class="username-change-backdrop" id="usernameChangeBackdrop" onclick="closeUsernameChangeOnBackdrop(event)">
        <div class="username-change-box">
            <img class="username-change-logo" src="assets/MAIN GKL LOGO.png" alt="" />
            <div class="input-wrapper-grad">
                <input type="text" id="newUsernameInput" placeholder="Enter new username..." maxlength="24" />
            </div>
            <button class="username-change-confirm-btn" onclick="handleUsernameChange()">Confirm</button>
            <span class="username-change-error" id="username-change-error"></span>
        </div>
    </div>

    <div class="passchange-overlay" id="passchangeOverlay">
        <div class="passchange-close-row">
            <img src="assets/close.png" alt="Close" onclick="closePasschangeOverlay()" />
        </div>
        <div class="passchange-overlay-content">
            <div class="passchange-input-row">
                <div class="passchange-input-wrapper">
                    <input type="password" class="passchange-input" placeholder="Enter new password..." id="newpass1" maxlength="22" />
                </div>
                <img class="toggle-pass" src="assets/eye-off.png" alt="toggle" onclick="togglePass('newpass1', this)" />
            </div>
            <div class="passchange-input-row">
                <div class="passchange-input-wrapper">
                    <input type="password" class="passchange-input" placeholder="Repeat new password..." id="newpass2" maxlength="22" />
                </div>
                <img class="toggle-pass" src="assets/eye-off.png" alt="toggle" onclick="togglePass('newpass2', this)" />
            </div>
            <button class="passchange-btn" onclick="handlePasswordChange()">Apply Changes</button>
            <span class="passchange-error" id="passchange-error"></span>
        </div>
    </div>

    <div class="purchasehistory-close-row" id="purchasehistoryCloseRow">
        <img src="assets/close.png" alt="Close" onclick="closePurchasehistoryOverlay()" />
    </div>

    <div class="purchasehistory-overlay" id="purchasehistoryOverlay">
        <div class="purchasehistory-content">
            <table class="purchasehistory-table">
                <thead>
                    <tr>
                        <th>Part Name</th>
                        <th>Part Model</th>
                        <th>Amount</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>

    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-overlay-content">
            <div class="menu-icons">
                <a href="support.html">
                    <img src="assets/Support Icon.png" alt="Support" />
                </a>
                <a href="store.html">
                    <img src="assets/Store Icon.png" alt="Store" />
                </a>
                <a href="#" onclick="handleLogout(); return false;">
                    <img src="assets/Log Out Icon.png" alt="Log Out" />
                </a>
            </div>
        </div>
        <div class="menu-close-row">
            <img src="assets/Pack up.png" alt="Close" onclick="closeOverlay()" />
        </div>
    </div>

    <script>
        requireLogin();
    </script>

</body>
</html>
